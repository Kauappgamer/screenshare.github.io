<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ScreenShare PRO</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
}

.screen { display:none; height:100vh; }

#login {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#roomScreen {
  display:flex;
  height:100vh;
}

.left {
  flex:3;
  display:flex;
  flex-direction:column;
  background:black;
}

.right {
  width:320px;
  background:#0f172a;
  padding:10px;
  overflow-y:auto;
}

video, iframe {
  width:100%;
  height:100%;
  background:black;
}

.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.chat-box {
  height:250px;
  overflow-y:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.msg {
  background:#1e293b;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
}

input {
  padding:8px;
  width:70%;
}
</style>
</head>

<body>

<div id="login">
  <h2>👤 Nome de usuário</h2>
  <input id="username" placeholder="Digite seu nome">
  <br>
  <button onclick="enterApp()">Entrar</button>
</div>

<div id="lobby" class="screen">
  <h2>📡 Lobby</h2>
  <button onclick="createRoom()">Criar Sala</button>
  <button onclick="joinRoom()">Entrar em Sala</button>
</div>

<div id="roomScreen" class="screen">

  <div class="left">
    <video id="video" autoplay playsinline></video>
    <iframe id="browser" style="display:none;"></iframe>
  </div>

  <div class="right">

    <h3 id="roomIdText"></h3>

    <div class="controls" id="hostControls" style="display:none;">
      <button onclick="shareScreen()">📺 Tela</button>
      <button onclick="toggleCamera()">📷 Câmera</button>
      <button onclick="toggleMic()">🎤 Microfone</button>
      <button onclick="openBrowser()">🌐 Navegador</button>
      <button onclick="toggleStreaming()">⏳ Delay</button>
      <button onclick="fullscreen()">⛶ Full</button>
    </div>

    <hr>

    <h3>💬 Chat</h3>
    <div class="chat-box" id="chat"></div>
    <input id="chatInput">
    <button onclick="sendChat()">Enviar</button>

  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
let peer;
let conn;
let roomId;
let isHost = false;
let stream = new MediaStream();
let username = "";
let streaming = false;

let micOn = false;
let camOn = false;

let currentCall;

const video = document.getElementById("video");
const browser = document.getElementById("browser");
const chatBox = document.getElementById("chat");

/* LOGIN */
function enterApp() {
  username = document.getElementById("username").value.trim();
  if(!username) return alert("Digite um nome");

  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";

  peer = new Peer();

  peer.on("connection", c=>{
    conn = c;
    setupConn();
  });

  peer.on("call", call=>{
    currentCall = call;
    call.answer(stream);
    call.on("stream", remoteStream=>{
      video.srcObject = remoteStream;
    });
  });
}

/* ROOM */
function createRoom() {
  isHost = true;
  roomId = Math.random().toString(36).substring(2,6).toUpperCase();
  openRoom();
  document.getElementById("roomIdText").innerText = "Sala: " + roomId;
}

function joinRoom() {
  isHost = false;
  roomId = prompt("Digite o ID da sala:");
  if(!roomId) return;

  openRoom();
  document.getElementById("roomIdText").innerText = "Sala: " + roomId;

  conn = peer.connect(roomId);
  setupConn();

  const call = peer.call(roomId, stream);
  currentCall = call;

  call.on("stream", remoteStream=>{
    video.srcObject = remoteStream;
  });
}

function openRoom() {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("roomScreen").style.display = "flex";

  if(isHost) {
    document.getElementById("hostControls").style.display = "block";
  }
}

/* ===== STREAM CONTROLS ===== */

function updateStream(newTracks) {
  newTracks.forEach(track => stream.addTrack(track));

  video.srcObject = stream;

  if(currentCall){
    const sender = currentCall.peerConnection.getSenders();
    stream.getTracks().forEach(track=>{
      const s = sender.find(s=>s.track && s.track.kind === track.kind);
      if(s) s.replaceTrack(track);
    });
  }
}

/* TELA */
async function shareScreen() {
  const scr = await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
  updateStream(scr.getTracks());
}

/* CAMERA */
async function toggleCamera() {
  if(camOn){
    stream.getVideoTracks().forEach(t=>t.stop());
    camOn = false;
    return;
  }

  const cam = await navigator.mediaDevices.getUserMedia({video:true});
  updateStream(cam.getVideoTracks());
  camOn = true;
}

/* MICROFONE */
async function toggleMic() {
  if(micOn){
    stream.getAudioTracks().forEach(t=>t.stop());
    micOn = false;
    return;
  }

  const mic = await navigator.mediaDevices.getUserMedia({audio:true});
  updateStream(mic.getAudioTracks());
  micOn = true;
}

/* DELAY */
function toggleStreaming() {
  streaming = !streaming;
  alert("Delay: " + (streaming ? "ON" : "OFF"));
}

/* FULLSCREEN */
function fullscreen() {
  video.requestFullscreen();
}

/* BROWSER */
function openBrowser() {
  browser.style.display = "block";
  video.style.display = "none";
  browser.src = "https://www.google.com";
}

/* CHAT */
function sendChat() {
  const input = document.getElementById("chatInput");
  const msg = input.value;
  if(!msg) return;

  const data = username + ": " + msg;

  addMsg(data);

  if(conn){
    conn.send({type:"chat", msg:data});
  }

  input.value = "";
}

function addMsg(msg) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = msg;
  chatBox.appendChild(div);
}

/* CONEXÃO */
function setupConn() {
  conn.on("data", data=>{
    if(data.type==="chat"){
      addMsg(data.msg);
    }
  });
}
</script>

</body>
</html>
