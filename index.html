<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ScreenShare PRO</title>

<style>
body {
  background:#020617;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

video {
  width:70%;
  border-radius:10px;
  background:black;
  margin-top:10px;
}

#app {
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>👤 Escolha seu nome</h2>
  <input id="username" placeholder="Digite seu nome">
  <br>
  <button onclick="enterApp()">Entrar</button>
</div>

<!-- APP -->
<div id="app">
  <h2>📡 ScreenShare PRO</h2>

  <div id="menu">
    <button onclick="createRoom()">Criar Sala</button>
    <button onclick="joinRoom()">Entrar na Sala</button>
  </div>

  <h3 id="roomInfo"></h3>

  <div id="controls" style="display:none;">
    <button onclick="shareScreen()">Compartilhar Tela</button>
  </div>

  <video id="video" autoplay playsinline></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
let peer;
let conn;
let call;
let localStream;

let username = "";
let roomId = "";
let isHost = false;

const video = document.getElementById("video");

function generateRoomId() {
  return Math.random().toString(36).substring(2,6).toUpperCase();
}

// LOGIN
function enterApp() {
  const name = document.getElementById("username").value.trim();
  if(!name) return alert("Digite um nome");

  // simulação simples de nomes únicos
  let usedNames = JSON.parse(localStorage.getItem("names") || "[]");

  if(usedNames.includes(name)) {
    return alert("Nome já em uso, escolha outro");
  }

  usedNames.push(name);
  localStorage.setItem("names", JSON.stringify(usedNames));

  username = name;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  peer = new Peer();
}

// CRIAR SALA
function createRoom() {
  isHost = true;
  roomId = generateRoomId();

  document.getElementById("roomInfo").innerText = "Sala: " + roomId;

  peer.on("open", id => {
    document.getElementById("controls").style.display = "block";
  });

  peer.on("call", call => {
    call.answer(localStream);
  });
}

// ENTRAR NA SALA
function joinRoom() {
  const id = prompt("Digite o ID da sala:");
  if(!id) return;

  roomId = id;
  isHost = false;

  document.getElementById("roomInfo").innerText = "Entrou na sala: " + roomId;

  const hostId = id;

  call = peer.call(hostId, null);

  call.on("stream", stream => {
    video.srcObject = stream;
  });
}

// COMPARTILHAR TELA (HOST)
async function shareScreen() {
  if(!isHost) return alert("Você não é o host");

  localStream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  video.srcObject = localStream;

  peer.on("call", call => {
    call.answer(localStream);
  });
}
</script>

</body>
</html>
