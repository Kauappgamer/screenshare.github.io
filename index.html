<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenShare Rooms</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1020;
  color:white;
}

#login, #app {
  display:none;
  height:100vh;
}

.center {
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  height:100%;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#videoArea {
  flex:3;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
}

video, iframe {
  width:100%;
  height:100%;
  object-fit:contain;
}

#panel {
  width:300px;
  background:#111827;
  padding:10px;
  overflow:auto;
}

#chat {
  height:200px;
  overflow:auto;
  background:#0f172a;
  padding:5px;
  margin-top:10px;
}

.msg {
  font-size:13px;
  margin:3px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>Entrar</h2>
  <input id="username" placeholder="Seu nome">
  <button onclick="setName()">Entrar</button>
</div>

<!-- APP -->
<div id="app">
  <div id="layout">
    
    <div id="videoArea">
      <video id="video" autoplay playsinline></video>
      <iframe id="browser" style="display:none;"></iframe>
    </div>

    <div id="panel">
      <h3 id="roomInfo"></h3>

      <button onclick="createRoom()">Criar Sala</button>
      <input id="roomIdInput" placeholder="ID da sala">
      <button onclick="joinRoom()">Entrar na Sala</button>

      <hr>

      <button onclick="shareScreen()">Compartilhar Tela</button>
      <button onclick="startCamera()">Câmera/Mic</button>
      <button onclick="openBrowser()">Navegador</button>

      <hr>

      <button onclick="toggleStream()">Modo Streaming</button>
      <button onclick="toggleFullscreen()">Tela cheia</button>

      <div id="chat"></div>
      <input id="msg" placeholder="Mensagem">
      <button onclick="sendMsg()">Enviar</button>
    </div>

  </div>
</div>

<script>
let peer, conn;
let stream;
let username;
let roomId;
let isHost = false;
let streamMode = false;

// LOGIN
document.getElementById("login").style.display="flex";

function setName() {
  username = document.getElementById("username").value;
  if(!username) return alert("Digite nome");

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  peer = new Peer(undefined, {
    host: "peerjs.com",
    secure: true,
    port: 443
  });

  peer.on("open", id=>{
    console.log("Peer ID:", id);
  });

  peer.on("connection", c=>{
    conn = c;
    setupConn();
  });

  peer.on("call", call=>{
    call.answer(stream);
    call.on("stream", remoteStream=>{
      document.getElementById("video").srcObject = remoteStream;
    });
  });
}

// SALA
function createRoom(){
  roomId = generateRoomId();
  isHost = true;
  document.getElementById("roomInfo").innerText = "Sala: " + roomId;

  alert("Compartilhe o ID: " + roomId);
}

function joinRoom(){
  roomId = document.getElementById("roomIdInput").value;
  if(!roomId) return;

  conn = peer.connect(roomId);
  setupConn();

  const call = peer.call(roomId, stream);
  call.on("stream", remoteStream=>{
    document.getElementById("video").srcObject = remoteStream;
  });

  document.getElementById("roomInfo").innerText = "Entrou na sala: " + roomId;
}

function setupConn(){
  conn.on("data", data=>{
    if(data.type==="chat"){
      addMsg(data.msg);
    }
  });
}

// STREAM
async function shareScreen(){
  stream = await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
}

async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
}

// NAVEGADOR
function openBrowser(){
  document.getElementById("video").style.display="none";
  document.getElementById("browser").style.display="block";
  document.getElementById("browser").src = "https://www.google.com";
}

// CHAT
function sendMsg(){
  let msg = document.getElementById("msg").value;
  addMsg("Você: "+msg);

  if(conn){
    conn.send({type:"chat", msg: username+": "+msg});
  }
}

function addMsg(msg){
  let div = document.createElement("div");
  div.className="msg";
  div.innerText = msg;
  document.getElementById("chat").appendChild(div);
}

// STREAM MODE (simulado)
function toggleStream(){
  streamMode = !streamMode;
  alert("Modo streaming: " + (streamMode ? "ON" : "OFF"));
}

// FULLSCREEN
function toggleFullscreen(){
  document.documentElement.requestFullscreen();
}

// ID ALEATÓRIO
function generateRoomId(){
  return Math.random().toString(36).substring(2,6).toUpperCase();
}
</script>

</body>
</html>
