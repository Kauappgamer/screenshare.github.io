<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ScreenShare PRO</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
}

.screen { display:none; height:100vh; }

#login {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#roomScreen {
  display:flex;
  height:100vh;
}

.left {
  flex:3;
  display:flex;
  flex-direction:column;
  background:black;
}

.right {
  width:320px;
  background:#0f172a;
  padding:10px;
  overflow-y:auto;
}

video, iframe {
  width:100%;
  height:100%;
  background:black;
}

.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.chat-box {
  height:250px;
  overflow-y:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.msg {
  background:#1e293b;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
}

input {
  padding:8px;
  width:70%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>👤 Nome de usuário</h2>
  <input id="username" placeholder="Digite seu nome">
  <br>
  <button onclick="enterApp()">Entrar</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <h2>📡 Lobby</h2>
  <button onclick="createRoom()">Criar Sala</button>
  <button onclick="joinRoom()">Entrar em Sala</button>
</div>

<!-- SALA -->
<div id="roomScreen" class="screen">

  <div class="left">
    <video id="video" autoplay playsinline></video>
    <iframe id="browser" style="display:none;"></iframe>
  </div>

  <div class="right">

    <h3 id="roomIdText"></h3>

    <div class="controls" id="hostControls" style="display:none;">
      <button onclick="shareScreen()">📺 Compartilhar Tela</button>
      <button onclick="openBrowser()">🌐 Navegador</button>
      <button onclick="toggleStreaming()">⏳ Modo Streaming</button>
      <button onclick="fullscreen()">⛶ Tela cheia</button>
    </div>

    <hr>

    <div>
      <h3>💬 Chat</h3>
      <div class="chat-box" id="chat"></div>
      <input id="chatInput" placeholder="Mensagem">
      <button onclick="sendChat()">Enviar</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
let peer;
let conn;
let roomId;
let isHost = false;
let stream;
let username = "";
let streaming = false;

const video = document.getElementById("video");
const browser = document.getElementById("browser");
const chatBox = document.getElementById("chat");

function enterApp() {
  username = document.getElementById("username").value.trim();
  if(!username) return alert("Digite um nome");

  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";

  peer = new Peer();

  peer.on("connection", c=>{
    conn = c;
    setupConn();
  });

  peer.on("call", call=>{
    call.answer(stream);
    call.on("stream", remoteStream=>{
      video.srcObject = remoteStream;
    });
  });
}

function createRoom() {
  isHost = true;
  roomId = Math.random().toString(36).substring(2,6).toUpperCase();

  openRoom();
  document.getElementById("roomIdText").innerText = "Sala: " + roomId;

  peer.on("call", call=>{
    call.answer(stream);
    call.on("stream", remoteStream=>{
      video.srcObject = remoteStream;
    });
  });
}

function joinRoom() {
  isHost = false;
  roomId = prompt("Digite o ID da sala:");
  if(!roomId) return;

  openRoom();
  document.getElementById("roomIdText").innerText = "Sala: " + roomId;

  conn = peer.connect(roomId);
  setupConn();

  const call = peer.call(roomId, stream);
  call.on("stream", remoteStream=>{
    video.srcObject = remoteStream;
  });
}

function openRoom() {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("roomScreen").style.display = "flex";

  if(isHost) {
    document.getElementById("hostControls").style.display = "block";
  }
}

/* STREAM */
async function shareScreen() {
  const original = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  stream = original;
  video.srcObject = stream;

  if(streaming) applyDelay(stream);
}

/* DELAY SIMPLES */
function applyDelay(stream) {
  const videoEl = document.createElement("video");
  videoEl.srcObject = stream;
  videoEl.play();

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  setInterval(()=>{
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    ctx.drawImage(videoEl,0,0);
    video.srcObject = canvas.captureStream(30);
  }, 6000); // delay 6s
}

/* NAVEGADOR */
function openBrowser() {
  browser.style.display = "block";
  video.style.display = "none";
  browser.src = "https://www.google.com";
}

/* STREAM MODE */
function toggleStreaming() {
  streaming = !streaming;
  alert("Modo streaming: " + (streaming ? "ON" : "OFF"));
}

/* FULLSCREEN */
function fullscreen() {
  document.getElementById("video").requestFullscreen();
}

/* CHAT */
function sendChat() {
  const input = document.getElementById("chatInput");
  const msg = input.value;
  if(!msg) return;

  const data = username + ": " + msg;

  addMsg(data);

  if(conn){
    conn.send({type:"chat", msg:data});
  }

  input.value = "";
}

function addMsg(msg) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = msg;
  chatBox.appendChild(div);
}

function setupConn() {
  conn.on("data", data=>{
    if(data.type==="chat"){
      addMsg(data.msg);
    }
  });
}
</script>

</body>
</html>
