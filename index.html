<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ScreenShare PRO</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
}

/* telas */
.screen {
  display:none;
  height:100vh;
}

/* login */
#login {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* layout sala */
#roomScreen {
  display:flex;
  height:100vh;
}

.left {
  flex:3;
  display:flex;
  flex-direction:column;
  background:black;
}

.right {
  width:320px;
  background:#0f172a;
  padding:10px;
  overflow-y:auto;
}

/* vídeo */
video, iframe {
  width:100%;
  height:100%;
  background:black;
}

/* controles */
.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.chat-box {
  height:300px;
  overflow-y:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.msg {
  background:#1e293b;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
}

input {
  padding:8px;
  width:70%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>👤 Nome de usuário</h2>
  <input id="username" placeholder="Digite seu nome">
  <br>
  <button onclick="enterApp()">Entrar</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <h2>📡 Lobby</h2>
  <button onclick="createRoom()">Criar Sala</button>
  <button onclick="joinRoom()">Entrar em Sala</button>
</div>

<!-- SALA -->
<div id="roomScreen" class="screen">

  <!-- esquerda: tela -->
  <div class="left">
    <video id="video" autoplay playsinline></video>
    <iframe id="browser" style="display:none;"></iframe>
  </div>

  <!-- direita: controles -->
  <div class="right">

    <h3 id="roomIdText"></h3>

    <div class="controls" id="hostControls" style="display:none;">
      <button onclick="shareScreen()">📺 Compartilhar Tela</button>
      <button onclick="startBrowser()">🌐 Navegador</button>
      <button onclick="toggleStreaming()">⏳ Modo Streaming</button>
      <button onclick="fullscreen()">⛶ Tela cheia</button>
    </div>

    <hr>

    <div>
      <h3>💬 Chat</h3>
      <div class="chat-box" id="chat"></div>
      <input id="chatInput" placeholder="Mensagem">
      <button onclick="sendChat()">Enviar</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
let peer;
let roomId;
let isHost = false;
let stream;
let username = "";
let streaming = false;

const video = document.getElementById("video");
const browser = document.getElementById("browser");
const chatBox = document.getElementById("chat");

/* LOGIN */
function enterApp() {
  username = document.getElementById("username").value.trim();
  if(!username) return alert("Digite um nome");

  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";

  peer = new Peer();
}

/* SALA */
function createRoom() {
  isHost = true;
  roomId = Math.random().toString(36).substring(2,6).toUpperCase();

  openRoom();

  document.getElementById("roomIdText").innerText = "Sala: " + roomId;

  peer.on("call", call => {
    call.answer(stream);
  });
}

function joinRoom() {
  isHost = false;
  roomId = prompt("Digite o ID da sala:");
  if(!roomId) return;

  openRoom();

  const call = peer.call(roomId, null);

  call.on("stream", remoteStream => {
    video.srcObject = remoteStream;
  });

  document.getElementById("roomIdText").innerText = "Sala: " + roomId;
}

/* ABRIR UI COMPLETA DA SALA */
function openRoom() {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("roomScreen").style.display = "flex";

  if(isHost) {
    document.getElementById("hostControls").style.display = "block";
  }
}

/* COMPARTILHAR */
async function shareScreen() {
  stream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  video.srcObject = stream;
}

/* NAVEGADOR */
function startBrowser() {
  browser.style.display = "block";
  video.style.display = "none";
  browser.src = "https://www.google.com";
}

/* STREAMING SIMPLES (toggle visual) */
function toggleStreaming() {
  streaming = !streaming;
  alert("Modo streaming: " + (streaming ? "ON" : "OFF"));
}

/* FULLSCREEN */
function fullscreen() {
  const elem = document.getElementById("video");
  if(elem.requestFullscreen) elem.requestFullscreen();
}

/* CHAT SIMPLES LOCAL */
function sendChat() {
  const input = document.getElementById("chatInput");
  const msg = input.value;
  if(!msg) return;

  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = username + ": " + msg;

  chatBox.appendChild(div);
  input.value = "";
}
</script>

</body>
</html>
